<svg viewBox="0 0 680 160" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Feito de Gente</title>

  <defs>
    <linearGradient id="flame" x1="0.3" y1="1" x2="0.6" y2="0">
      <stop offset="0%" stop-color="#F5B942"/>
      <stop offset="55%" stop-color="#E86030"/>
      <stop offset="100%" stop-color="#C83A18"/>
    </linearGradient>
    <linearGradient id="candle" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#EAE0C0"/>
      <stop offset="50%" stop-color="#F8F2E0"/>
      <stop offset="100%" stop-color="#D5C99A"/>
    </linearGradient>
    <linearGradient id="leafL" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#78CC65"/>
      <stop offset="100%" stop-color="#2E7828"/>
    </linearGradient>
    <linearGradient id="leafR" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#78CC65"/>
      <stop offset="100%" stop-color="#2E7828"/>
    </linearGradient>
  </defs>

  <!-- ÍCONE — centrado em x=86, y=82 -->
  <g transform="translate(86,84)">

    <!-- Folha esquerda -->
    <path d="M-11,52 C-44,36 -76,14 -78,-16 C-80,-34 -64,-46 -46,-37 C-27,-26 -12,12 -11,52Z"
          fill="url(#leafL)" stroke="#1E6018" stroke-width="0.7"/>
    <path d="M-12,50 C-35,22 -56,-2 -64,-28"
          stroke="#2A7020" stroke-width="0.5" fill="none" opacity="0.35"/>

    <!-- Folha direita -->
    <path d="M11,52 C44,36 76,14 78,-16 C80,-34 64,-46 46,-37 C27,-26 12,12 11,52Z"
          fill="url(#leafR)" stroke="#1E6018" stroke-width="0.7"/>
    <path d="M12,50 C35,22 56,-2 64,-28"
          stroke="#2A7020" stroke-width="0.5" fill="none" opacity="0.35"/>

    <!-- Vela corpo -->
    <rect x="-15" y="-4" width="30" height="60" rx="5" fill="url(#candle)" stroke="#C2AF82" stroke-width="0.6"/>
    <ellipse cx="0" cy="-4" rx="15" ry="3.5" fill="#F5EDD5" stroke="#C2AF82" stroke-width="0.5"/>
    <!-- brilho -->
    <rect x="-9" y="4" width="4.5" height="42" rx="2.2" fill="#fff" opacity="0.2"/>

    <!-- Pavio -->
    <line x1="0" y1="-7" x2="0" y2="-18" stroke="#3C2810" stroke-width="1.8" stroke-linecap="round"/>

    <!-- Chama externa -->
    <path d="M0,-72 C13,-54 20,-36 16,-17 C14,-5 7,4 0,8 C-7,4 -14,-5 -16,-17 C-20,-36 -13,-54 0,-72Z"
          fill="url(#flame)"/>
    <!-- Chama interna -->
    <path d="M0,-56 C7,-42 10,-28 8,-14 C6,-4 2,3 0,6 C-2,3 -6,-4 -8,-14 C-10,-28 -7,-42 0,-56Z"
          fill="#FFE88A" opacity="0.65"/>

    <!-- Base tracejada -->
    <path d="M-78,62 C-52,56 -26,58 0,56 C26,58 52,56 78,62"
          stroke="#9A6428" stroke-width="1.6" fill="none"
          stroke-linecap="round" stroke-dasharray="4,3" opacity="0.7"/>
  </g>

  <!-- Separador vertical -->
  <line x1="196" y1="30" x2="196" y2="134"
        stroke="#D8C8A8" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Texto principal — maior, mais presença -->
  <text
    x="220" y="106"
    font-family="Georgia,'Times New Roman',serif"
    font-style="italic"
    font-size="66"
    font-weight="400"
    fill="#2E1A0E"
    letter-spacing="-0.5">feito de gente</text>

</svg>
