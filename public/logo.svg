<svg viewBox="0 0 720 150" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Feito de Gente</title>
  <defs>
    <linearGradient id="fl" x1="0.4" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#FFD000"/>
      <stop offset="45%" stop-color="#FF6200"/>
      <stop offset="100%" stop-color="#E02000"/>
    </linearGradient>
    <linearGradient id="cv" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E6D9A8"/>
      <stop offset="50%" stop-color="#F8F2DC"/>
      <stop offset="100%" stop-color="#D4C880"/>
    </linearGradient>
    <linearGradient id="lL" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a7a40"/>
      <stop offset="100%" stop-color="#33c068"/>
    </linearGradient>
    <linearGradient id="lR" x1="1" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#1a7a40"/>
      <stop offset="100%" stop-color="#33c068"/>
    </linearGradient>
  </defs>

  <g transform="translate(78,78)">
    <!-- Folha esquerda -->
    <path d="M-6,52 C-22,44 -58,28 -68,0 C-74,-18 -58,-36 -40,-26 C-24,-16 -8,18 -6,52Z"
          fill="url(#lL)"/>
    <path d="M-7,50 C-28,24 -48,2 -58,-20" stroke="#1a7a40" stroke-width="1" fill="none" opacity="0.35"/>

    <!-- Folha direita -->
    <path d="M6,52 C22,44 58,28 68,0 C74,-18 58,-36 40,-26 C24,-16 8,18 6,52Z"
          fill="url(#lR)"/>
    <path d="M7,50 C28,24 48,2 58,-20" stroke="#1a7a40" stroke-width="1" fill="none" opacity="0.35"/>

    <!-- Vela corpo -->
    <rect x="-14" y="-4" width="28" height="60" rx="4" fill="url(#cv)" stroke="#0d6a6a" stroke-width="2.8"/>
    <!-- Topo da vela -->
    <ellipse cx="0" cy="-4" rx="14" ry="4" fill="#F2EAD0" stroke="#0d6a6a" stroke-width="2.5"/>
    <!-- Brilho -->
    <rect x="-7" y="4" width="4" height="38" rx="2" fill="#fff" opacity="0.22"/>

    <!-- Pavio -->
    <line x1="0" y1="-8" x2="0" y2="-17" stroke="#3C2810" stroke-width="2" stroke-linecap="round"/>

    <!-- Chama -->
    <path d="M0,-64 C11,-48 17,-32 14,-16 C12,-5 6,4 0,8 C-6,4 -12,-5 -14,-16 C-17,-32 -11,-48 0,-64Z"
          fill="url(#fl)"/>
    <!-- Brilho da chama -->
    <path d="M0,-50 C6,-38 9,-26 7,-13 C5,-4 2,2 0,5 C-2,2 -5,-4 -7,-13 C-9,-26 -6,-38 0,-50Z"
          fill="#FFE84A" opacity="0.65"/>

    <!-- Linha base -->
    <line x1="-66" y1="60" x2="66" y2="60" stroke="#0d6a6a" stroke-width="2.2" stroke-linecap="round"/>
    <!-- Pontinhos decorativos -->
    <circle cx="-52" cy="55" r="3" fill="#0d6a6a"/>
    <circle cx="52" cy="55" r="3" fill="#0d6a6a"/>
    <circle cx="-38" cy="57" r="1.8" fill="#0d6a6a" opacity="0.5"/>
    <circle cx="38" cy="57" r="1.8" fill="#0d6a6a" opacity="0.5"/>
  </g>

  <!-- Separador -->
  <line x1="162" y1="22" x2="162" y2="128" stroke="rgba(255,255,255,0.3)" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Nome -->
  <text
    x="180" y="102"
    font-family="'Brush Script MT','Segoe Script','Comic Sans MS',cursive"
    font-size="64"
    fill="#ffffff"
    letter-spacing="1">feito de gente</text>
</svg>